# SonarQube configuration for the kista project.
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/analysis-parameters/

sonar.projectKey=deveel_deveel.repository
sonar.organization=deveel

# Sample apps intentionally reproduce the same endpoint patterns with
# deliberately different model/DTO types to illustrate each feature in
# isolation; their textual similarity is pedagogical, not accidental
# copy-paste, so they are excluded from duplicated-code detection.
sonar.cpd.exclusions=**/Kista.SampleApp.*/Endpoints/TaskEndpoints.cs